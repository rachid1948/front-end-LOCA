<div class="page-wrapper">

  <!-- Sidebar dynamique -->
  <app-sidebar></app-sidebar>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <a href="/dashboard" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div>
          <h2>Saisir une opération</h2>
          <span>Nouvelle location de voiture</span>
        </div>
      </div>
    </header>

    <!-- Form Card -->
    <div class="form-card">

      <div class="form-grid">

        <!-- Nom complet -->
        <div class="field full">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Nom complet
          </label>
          <input type="text" id="client" placeholder="Ex : Karim Benali"/>
        </div>

        <!-- Choix voiture -->
        <div class="field full">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 17h18M5 17V9l2-4h10l2 4v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="7.5" cy="17" r="1.5" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="16.5" cy="17" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Voiture
          </label>
          <div class="select-wrapper">
            <select id="vehiculeId">
              <option value="" disabled selected>Chargement des voitures...</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <!-- Date départ -->
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Date de départ
          </label>
          <input type="date" id="dateDepart"/>
        </div>

        <!-- Date retour -->
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Date de retour
          </label>
          <input type="date" id="dateRetour"/>
        </div>

        <!-- Prix journalière -->
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Prix journalière (DH)
          </label>
          <input type="number" id="prixJour" placeholder="Ex : 350"/>
        </div>

        <!-- Téléphone -->
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Téléphone
          </label>
          <input type="tel" placeholder="Ex : 06 12 34 56 78"/>
        </div>

        <!-- Avance -->
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Avance (DH)
          </label>
          <input type="number" id="avance" placeholder="Ex : 500" min="0"/>
        </div>

      </div>

      <!-- Récapitulatif total -->
      <div class="recap" id="recap-attente">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Remplissez les dates et le prix pour calculer le total automatiquement.

      <div class="recap recap-result" id="recap-result" style="display:none">
        <div class="recap-item">
          <span class="recap-label">Nombre de jours</span>
          <span class="recap-value" id="nbJours">—</span>
        </div>
        <div class="recap-sep"></div>
        <div class="recap-item">
          <span class="recap-label">Prix journalière</span>
          <span class="recap-value" id="prixAffiche">—</span>
        </div>
        <div class="recap-sep"></div>
        <div class="recap-item">
          <span class="recap-label">Avance reçue</span>
          <span class="recap-value" id="avanceAffichee">—</span>
        </div>
        <div class="recap-sep"></div>
        <div class="recap-item total">
          <span class="recap-label">Total à payer</span>
          <span class="recap-value" id="totalPrix">—</span>
        </div>
        <div class="recap-sep"></div>
        <div class="recap-item">
          <span class="recap-label">Reste à payer</span>
          <span class="recap-value" id="resteAffiche">—</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <a href="/dashboard" class="btn-cancel">Annuler</a>
        <button type="button" class="btn-submit" onclick="saisirSubmit()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Enregistrer l'opération
        </button>
      </div>

      <!-- Toast -->
      <div id="saisir-toast" style="display:none; margin-top:16px; padding:12px 20px; border-radius:8px; font-weight:600; text-align:center;"></div>

    </div>
  <!-- Fin main -->

</div>
