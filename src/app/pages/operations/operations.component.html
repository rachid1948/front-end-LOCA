<div class="page-wrapper">
  <app-sidebar></app-sidebar>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <a href="/dashboard" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div>
          <h2 class="topbar-title">Les Opérations</h2>
          <p class="topbar-sub">Historique de toutes les locations</p>
        </div>
      </div>
    </header>

    <div class="content-area">
      <div class="table-panel">
        <div class="panel-header">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Liste des opérations
          </div>
          <span class="badge-count" id="ops-count">20 opérations</span>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
          <div class="filter-left">
            <div class="filter-status-group">
              <button class="flt-btn active" id="flt-all" onclick="opsFilter('all')">Tous</button>
              <button class="flt-btn" id="flt-paid" onclick="opsFilter('paid')">
                <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Payé
              </button>
              <button class="flt-btn" id="flt-unpaid" onclick="opsFilter('unpaid')">
                <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M15 9l-6 6M9 9l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Non payé
              </button>
            </div>
          </div>
          <div class="filter-right">
            <div class="search-field">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="text" id="flt-search" placeholder="Client, voiture, matricule..." oninput="opsSearch(this.value)" />
            </div>
            <div class="date-range">
              <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="date" id="flt-from" onchange="opsDates()" title="Date de départ — depuis" />
              <span class="date-sep">→</span>
              <input type="date" id="flt-to" onchange="opsDates()" title="Date de départ — jusqu'à" />
            </div>
            <button class="flt-reset" onclick="opsReset()" title="Réinitialiser les filtres">
              <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21 3v5h-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 16H3v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Reset
            </button>
          </div>
        </div>

        <div class="table-scroller">
          <table class="data-table">
            <thead>
              <tr>
                <th>Marque</th>
                <th>Matricule</th>
                <th>Client</th>
                <th>Départ</th>
                <th>Retour</th>
                <th>Jours</th>
                <th>Prix/j</th>
                <th>Total</th>
                <th>Avance</th>
                <th>Statut</th>
                <th>Reste</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ops-tbody">
              <tr><td colspan="12" class="loading-row">Chargement...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-bar" id="ops-pagination"></div>
      </div>
    </div>
  </main>

  <!-- Modal Modifier -->
  <div class="modal-overlay" id="ops-modal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Modifier l'opération
        </div>
        <button class="modal-close" onclick="opsClose()">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-field">
            <label>Marque</label>
            <input type="text" id="ed-marque" placeholder="Marque du véhicule" />
          </div>
          <div class="form-field">
            <label>Matricule</label>
            <input type="text" id="ed-matricule" placeholder="Matricule" />
          </div>
        </div>
        <div class="form-field full">
          <label>Nom complet du client</label>
          <input type="text" id="ed-client" placeholder="Nom complet" />
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Date de départ</label>
            <input type="date" id="ed-aller" />
          </div>
          <div class="form-field">
            <label>Date de retour</label>
            <input type="date" id="ed-retour" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Prix journalier (DH)</label>
            <input type="number" id="ed-prix" placeholder="ex: 300" min="0" />
          </div>
          <div class="form-field">
            <label>Avance actuelle (DH)</label>
            <input type="number" id="ed-paye" readonly class="input-readonly" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full avance-complement-field">
            <label>Nouveau versement (DH) <span class="label-hint">— s'additionne à l'avance actuelle</span></label>
            <input type="number" id="ed-avance-complement" placeholder="0" min="0" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-btn-cancel" onclick="opsClose()">Annuler</button>
        <button class="modal-btn-save" onclick="opsSave()">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Enregistrer
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Clôturer location ouverte -->
  <div class="modal-overlay" id="ops-cloture-modal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/></svg>
          Clôturer la location
        </div>
        <button class="modal-close" onclick="opsCloseCloture()">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p id="cl-info" style="font-size:13px; color:rgba(160,210,255,0.7); margin-bottom:16px;"></p>
        <div class="form-field full">
          <label>Date de retour réelle</label>
          <input type="date" id="cl-dateRetour" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn-cancel" onclick="opsCloseCloture()">Annuler</button>
        <button class="modal-btn-save" onclick="opsSaveCloture()">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/></svg>
          Confirmer le retour
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-success" id="ops-toast">
    <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="ops-toast-msg">Opération mise à jour</span>
  </div>

</div>
