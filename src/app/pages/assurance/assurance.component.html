<div class="page-wrapper">
  <app-sidebar></app-sidebar>

  <!-- Main -->
  <div class="main-content">

    <div class="topbar">
      <div class="topbar-left">
        <a href="/assurance-hub" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div>
          <h2 class="topbar-title">Assurance</h2>
          <p class="topbar-sub">Gestion des assurances par année</p>
        </div>
      </div>
      <button class="btn-add" onclick="assuranceOpenNew()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Nouvelle assurance
      </button>
    </div>

    <div class="content-area">

      <!-- Year filter + total banner -->
      <div class="year-filter-row">
        <div class="year-select-wrap">
          <label class="year-select-label">Année</label>
          <select class="year-select" (change)="selectedYear = +$any($event.target).value; applyFilter()">
            <option *ngFor="let y of years" [value]="y" [selected]="y === selectedYear">{{ y }}</option>
          </select>
        </div>
        <div class="total-banner">
          <div class="total-label">Total assurances {{ selectedYear }}</div>
          <div class="total-amount" id="assurance-total">0 DH</div>
          <div class="total-sub" id="assurance-count">0 véhicule(s)</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-panel">
        <table class="assurance-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Véhicule</th>
              <th>Matricule</th>
              <th>Date début</th>
              <th>Date expiration</th>
              <th>Montant</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assurance-tbody">
            <tr><td colspan="7" class="empty-row">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </div><!-- content-area -->
  </div><!-- main-content -->

  <!-- ── Modal ── -->
  <div id="assurance-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this) assuranceCloseModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Assurance</h3>
        <button class="modal-close" onclick="assuranceCloseModal()">
          <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group form-group-full">
            <label>Véhicule *</label>
            <select id="modal-vehicule" class="form-input">
              <option value="">-- Sélectionner un véhicule --</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group-full">
            <label>Année</label>
            <input id="modal-annee" type="number" class="form-input" placeholder="Ex: 2026" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date début *</label>
            <input id="modal-date-debut" type="date" class="form-input" />
          </div>
          <div class="form-group">
            <label>Date expiration *</label>
            <input id="modal-date-exp" type="date" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label>Montant (DH) *</label>
          <input id="modal-montant" type="number" class="form-input" placeholder="Ex: 1200" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-delete-btn" class="btn-danger" style="display:none">
          <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Supprimer
        </button>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="assuranceCloseModal()">Annuler</button>
          <button class="btn-save" onclick="assuranceSave()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

</div>
