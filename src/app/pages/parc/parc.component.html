<div class="page-wrapper">
  <app-sidebar></app-sidebar>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <a href="/dashboard" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div>
          <h2>Parc de Véhicules</h2>
          <span>Tous vos véhicules avec matricule</span>
        </div>
      </div>

      <!-- Barre de recherche -->
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="parc-search" placeholder="Rechercher un véhicule ou matricule…"/>
      </div>

      <!-- Bouton ajouter -->
      <a href="/ajouter-vehicule" class="btn-add add-vehicle-btn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Ajouter un véhicule
      </a>
    </header>

    <!-- Filtres -->
    <div class="filter-tabs">
      <button class="filter-btn active" id="fp-all"         data-filter="all"         onclick="filterParc('all')">Tous <span class="count">15</span></button>
      <button class="filter-btn available" id="fp-available" data-filter="available"   onclick="filterParc('available')"><i class="dot available"></i>Disponible</button>
      <button class="filter-btn rented"    id="fp-rented"    data-filter="rented"       onclick="filterParc('rented')"><i class="dot rented"></i>Louée</button>
      <button class="filter-btn maint"     id="fp-maintenance" data-filter="maintenance" onclick="filterParc('maintenance')"><i class="dot maint"></i>Maintenance</button>
    </div>

    <!-- Grille de cartes -->
    <div class="parc-grid" id="parc-grid">
      <div class="parc-empty">Chargement...</div>
    </div>

  </main>
</div>

<!-- Modal Modifier Véhicule -->
<div class="modal-overlay" id="parc-edit-modal">
  <div class="modal-box">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5"/></svg>
      Modifier le véhicule
    </div>

    <div class="modal-field">
      <label>MARQUE</label>
      <input type="text" id="pe-marque" placeholder="ex: Renault"/>
    </div>
    <div class="modal-field">
      <label>MODÈLE</label>
      <input type="text" id="pe-modele" placeholder="ex: Clio"/>
    </div>
    <div class="modal-field">
      <label>MATRICULE WW <span style="color:#ff6b35;">*</span></label>
      <input type="text" id="pe-matriculeWW" placeholder="ex: WW-001-25" style="font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase;"/>
      <div class="field-hint">Matricule provisoire — toujours conservé en base</div>
    </div>
    <div class="modal-field">
      <label>MATRICULE OFFICIEL <span style="color:rgba(0,245,255,0.4);">(optionnel)</span></label>
      <input type="text" id="pe-matricule" placeholder="ex: 62631-A-11" style="font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase;"/>
      <div class="field-hint">Renseigner quand le véhicule est immatriculé définitivement</div>
    </div>
    <div class="modal-field">
      <label>DATE DE MISE EN CIRCULATION</label>
      <input type="date" id="pe-dateCirculation"/>
    </div>
    <div class="modal-field">
      <label>STATUT</label>
      <select id="pe-statut">
        <option value="DISPONIBLE">Disponible</option>
        <option value="MAINTENANCE">En maintenance</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="modal-cancel" onclick="parcCloseEdit()">Annuler</button>
      <button class="modal-save" onclick="parcSaveEdit()">Enregistrer</button>
    </div>
  </div>
</div>
