<div class="login-wrapper">

  <!-- Animated background particles -->
  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- Glowing grid lines -->
  <div class="grid-lines"></div>

  <div class="login-card">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="logo-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 40 L14 24 Q16 18 24 18 L40 18 Q48 18 50 24 L56 40 Q58 44 56 46 L56 50 Q56 52 54 52 L48 52 Q46 52 46 50 L46 46 L18 46 L18 50 Q18 52 16 52 L10 52 Q8 52 8 50 L8 46 Q6 44 8 40Z" stroke="url(#carGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
          <circle cx="20" cy="46" r="4" fill="url(#carGrad)"/>
          <circle cx="44" cy="46" r="4" fill="url(#carGrad)"/>
          <path d="M18 30 L22 22 L42 22 L46 30Z" fill="url(#carGrad)" opacity="0.3"/>
          <defs>
            <linearGradient id="carGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00f5ff"/>
              <stop offset="100%" stop-color="#7b2fff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-name">LOCA<span>DRIVE</span></h1>
      <p class="brand-sub">Location de voitures Premium</p>
    </div>

    <!-- Form -->
    <form autocomplete="off">

      <div class="input-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <input
            id="username"
            type="text"
            name="username"
            placeholder="ex: admin"
          />
          <div class="input-glow"></div>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="••••••••"
          />
          <button type="button" class="toggle-password" id="togglePassword">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
          <div class="input-glow"></div>
        </div>
      </div>

      <div id="login-error" style="display:none; color:#ff4757; font-size:0.83rem; margin-bottom:8px; text-align:center;"></div>

      <button type="submit" class="btn-login">
        <span class="btn-text">Se connecter</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="btn-glow"></div>
      </button>

    </form>

    <div class="divider"><span>ou</span></div>

    <p class="register-link">
      <a href="/forgot-password">Mot de passe oublié ?</a>
    </p>
  </div>

</div>
