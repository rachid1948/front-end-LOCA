<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>LOCA<span>DRIVE</span></h1>
      <p>Mot de passe oublié</p>
    </div>

    <div id="forgot-error" class="alert-error" style="display:none"></div>
    <div id="forgot-success" class="alert-success" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Si cet email existe, un lien de réinitialisation a été envoyé.
    </div>

    <p class="instructions">Entrez votre adresse email. Si elle est enregistrée, vous recevrez un lien de réinitialisation.</p>

    <form id="forgot-form">
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="votre@email.com" required />
      </div>
      <button type="submit" class="btn-submit" id="forgot-btn">Envoyer le lien</button>
    </form>

    <div class="auth-links">
      <a href="/login">← Retour à la connexion</a>
    </div>
  </div>
</div>
